{% extends 'account/base.html' %}
{% block content %}

<style>
  body {
    background: linear-gradient(to right, #f8f9fa, #e3eafc);
    font-family: 'Segoe UI', sans-serif;
  }

  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px; /* Tight gap from navbar */
    min-height: calc(100vh - 30px);
  }

  .login-card {
    background: white;
    border-radius: 1rem;
    box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.08);
    padding: 3rem 4rem;
    width: 100%;
    max-width: 700px;
    animation: fadeIn 0.5s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card h2 {
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 2rem;
    text-align: center;
  }

  .form-floating label {
    color: #6c757d;
  }

  .btn-glow {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    border: none;
    color: white;
    font-weight: 600;
    box-shadow: 0 0.5rem 1rem rgba(0, 114, 255, 0.3);
    transition: all 0.3s ease;
  }

  .btn-glow:hover {
    background: linear-gradient(to right, #0072ff, #00c6ff);
    transform: scale(1.02);
    box-shadow: 0 0.75rem 1.5rem rgba(0, 114, 255, 0.4);
  }

  .forgot-link {
    font-size: 0.9rem;
    color: #6c757d;
    text-decoration: none;
  }

  .forgot-link:hover {
    color: #0072ff;
  }
</style>

<div class="container login-wrapper">
  <div class="login-card">
    <h2>🔐 Login to Your Account</h2>

    <form action="{% url 'login' %}" method="POST">
      {% csrf_token %}

      <!-- Username -->
      <div class="form-floating mb-4">
        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
        <label for="username">Username</label>
      </div>

      <!-- Password -->
      <div class="form-floating mb-4">
        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
        <label for="password">Password</label>
      </div>

      <!-- Forgot Password -->
      <div class="text-end mb-3">
        <a href="{% url 'forget_password' %}" class="forgot-link">
          <i class="bi bi-question-circle"></i> Forgot Password?
        </a>
      </div>

      <!-- Login Button -->
      <div class="d-grid">
        <button type="submit" class="btn btn-glow btn-lg">
          <i class="bi bi-box-arrow-in-right me-2"></i> Login
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
