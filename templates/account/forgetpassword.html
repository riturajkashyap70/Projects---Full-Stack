{% extends 'account/base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<br>

<br>
<div class="container">
    <div class="jumbotron">
        <div class="row">
            <div class="card card-body" style="border: 2px solid;">
                <h1 style="text-align: center">Forget Password</h1>
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-success">{{ message }}</div>
                {% endfor %}
                {% endif %}
                <form method="POST" action="{% url 'forget_password' %}">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <br />
                    <center> <button type="submit" class="btn btn-primary">Reset Password</button></center>
                </form>
            </div>
        </div>
    </div>
</div>


{% endblock %}
