<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        nav div {
            display: flex;
            gap: 20px;

        }

        ul li a {
            text-decoration: none;

        }

        ul {
            display: flex;
        }

        nav {
            display: flex;
            justify-content: space-between;
        }

        * {
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <br>
    <div class="container">
        <div class="jumbotron">
            <div class="card card-body">
                <nav>
                    <ul style="list-style-type: none; display: flex; gap: 4%;">
                        <li><a href="{% url 'home' %}">Home</a></li>
                        <li><a href="{% url 'all_defects' %}">All_Defects</a></li>
                        <li><a href="{% url 'completed_defects' %}">Complete</a></li>
                        <li><a href="{% url 'pending_defects' %}">Pending</a></li>

                    </ul>
                    <div>
                        <h6>Welcome,{{ user.username }}</h6>
                        <h6><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-person-circle" viewBox="0 0 16 16">
                                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                                <path fill-rule="evenodd"
                                    d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                            </svg></h6>
                    </div>
                </nav>
            </div>
        </div>
    </div>

    



    {% block content %}

    {% endblock %}

</html>
